name: Apartment Price Tracker

on:
  schedule:
    # 13:00 UTC is 9 AM EDT / 8 AM EST in Toronto.
    - cron: "0 13 * * *"
  workflow_dispatch:

concurrency:
  group: apartment-price-tracker
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Run scraper
        run: |
          python scraper.py --no-sheets

      - name: Commit updated price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/unit_prices.csv data/unit_snapshots.csv data/report.html
          if git diff --cached --quiet; then
            echo "No price-history changes to commit."
            exit 0
          fi
          git commit -m "chore: update apartment price snapshots"
          git push

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p site
          cp data/report.html site/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-report:
    needs: run-scraper
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
